<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 32px; width: 320px; }
    h1 { font-size: 1.2rem; color: #58a6ff; margin-bottom: 24px; text-align: center; }
    label { display: block; font-size: 0.85rem; color: #8b949e; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; color: #e6edf3; font-size: 0.95rem; margin-bottom: 16px;
    }
    input[type="password"]:focus { outline: none; border-color: #58a6ff; }
    button { width: 100%; padding: 10px; background: #238636; border: none; border-radius: 6px;
             color: #fff; font-size: 0.95rem; cursor: pointer; }
    button:hover { background: #2ea043; }
    .error { color: #f85149; font-size: 0.85rem; margin-bottom: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Login</h1>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus required>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
